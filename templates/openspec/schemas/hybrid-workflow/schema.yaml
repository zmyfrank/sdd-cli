name: hybrid-workflow
version: 1
description: |
  融合工作流 - 结合 OpenSpec 灵活性与 Trinity 追踪能力

  核心理念：
  - 灵活启动：可选探索阶段
  - 强制追踪：必须初始化 Planning-with-Files
  - 快速执行：支持 ff 模式一键生成
  - 系统化错误处理：3-Strike 协议

# ================================================
# 工作流模式
# ================================================
modes:
  quick:
    description: 快速模式 - 明确需求时使用
    flow: ["init", "ff", "apply", "archive"]

  explore:
    description: 探索模式 - 需求不明确时使用
    flow: ["explore", "init", "continue", "apply", "archive"]

  structured:
    description: 结构化模式 - 大型功能开发
    flow: ["init", "proposal", "design", "specs", "tasks", "apply", "archive"]

# ================================================
# 追踪层 (强制)
# ================================================
tracking:
  required: true
  skill: planning-with-files
  files:
    - task_plan.md
    - findings.md
    - progress.md
  instruction: |
    [MUST] 执行任何工作流前，调用 planning-with-files 技能初始化追踪。

    自动创建：
    - task_plan.md: 阶段、目标、决策、错误日志
    - findings.md: 技术发现、架构决策 (ADR)
    - progress.md: 会话进度日志

# ================================================
# Workflow Artifacts 定义
# ================================================
artifacts:
  # ----------------------------------------------
  # Phase 0: 探索 (可选)
  # ----------------------------------------------
  - id: exploration
    generates: exploration.md
    description: 问题空间探索
    optional: true
    instruction: |
      在需求不明确时进行探索。

      探索内容：
      1. 问题定义
      2. 现状分析
      3. 可能方案
      4. 技术调研
      5. 风险识别

      输出：探索报告，指导后续 proposal
    requires: []

  # ----------------------------------------------
  # Phase 1: 需求提案
  # ----------------------------------------------
  - id: proposal
    generates: proposal.md
    description: 需求探索与方案设计
    template: proposal.md
    instruction: |
      ## 快速创建

      触发词: superpowers/brainstorming 或 /superpowers:brainstorming

      ## 追踪初始化 [MUST]
      执行前调用：Use the Skill tool with skill: "planning-with-files"

      创建需求提案文档，聚焦于 WHY 和 WHAT。

      关键点：
      1. 问题陈述
      2. 方案选项
      3. 成功指标
      4. 非目标
      5. 影响评估

      完成后更新 task_plan.md：
      - Phase: proposal
      - Status: complete
      - Progress: 20%
    requires: []

  # ----------------------------------------------
  # Phase 2: 技术设计
  # ----------------------------------------------
  - id: design
    generates: design.md
    description: 技术架构设计
    template: design.md
    instruction: |
      触发词: @writing-plans 或 /writing-plans

      创建技术设计文档，聚焦于 HOW。

      关键点：
      1. 架构概述
      2. 数据模型
      3. API 设计
      4. 组件设计
      5. 风险与缓解

      [OPTIONAL] 架构图：Use the Skill tool with skill: "excalidraw-diagram"

      完成后更新 task_plan.md：
      - Phase: design
      - Status: complete
      - Progress: 40%

      在 findings.md 记录架构决策（ADR）。
    requires:
      - proposal

  # ----------------------------------------------
  # Phase 3: 规格说明
  # ----------------------------------------------
  - id: specs
    generates: specs/**/*.md
    description: 功能规格说明
    template: spec.md
    instruction: |
      创建功能规格说明文档。

      使用 Gherkin 格式：
      - Feature: 功能名称
      - Scenario: 场景描述
      - Given: 前置条件
      - When: 触发动作
      - Then: 期望结果

      覆盖三种场景：
      - Happy Path: 成功路径
      - Edge Cases: 边界情况
      - Error Cases: 错误处理

      完成后更新 task_plan.md：
      - Phase: specs
      - Status: complete
      - Progress: 60%
    requires:
      - design

  # ----------------------------------------------
  # Phase 4: 任务分解
  # ----------------------------------------------
  - id: tasks
    generates: tasks.md
    description: 实现任务清单
    template: tasks.md
    instruction: |
      触发词: @executing-plans 或 /executing-plans

      创建任务分解清单。

      任务粒度要求：
      - 每个任务 2-5 分钟可完成
      - 每个任务有明确的验证步骤
      - 任务按批次组织
      - 使用 `- [ ] X.Y Task description` 格式

      完成后更新 task_plan.md：
      - Phase: tasks
      - Status: complete
      - Progress: 80%

      准备进入 apply 阶段。
    requires:
      - specs

# ================================================
# Fast-Forward 模式
# ================================================
fastForward:
  enabled: true
  command: ff
  description: 一键生成所有规划文档
  artifacts:
    - proposal
    - design
    - specs
    - tasks
  instruction: |
    快速生成所有规划文档。

    执行流程：
    1. 初始化追踪层
    2. 依次创建 proposal → design → specs → tasks
    3. 更新进度追踪

    适用场景：
    - 需求明确
    - 时间紧迫
    - 中小型功能

# ================================================
# Apply 阶段配置
# ================================================
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    ## 执行流程

    1. 读取 tasks.md 获取任务列表
    2. 读取 task_plan.md 获取执行状态
    3. 按批次执行任务
    4. 完成任务后：
       - 更新 tasks.md 的 checkbox: `- [ ]` → `- [x]`
       - 更新 task_plan.md 的 Progress
       - 记录 progress.md 操作日志

    ## 错误处理（3-Strike 协议）

    | 尝试 | 动作 |
    |------|------|
    | Attempt 1 | 诊断并修复 |
    | Attempt 2 | 尝试替代方案 |
    | Attempt 3 | 重新思考问题 |
    | 3次失败 | 升级给用户 |

    在 task_plan.md 的错误日志中记录每次尝试。

    ## 完成标准

    - 所有 tasks.md 的 checkbox 已勾选
    - task_plan.md Progress: 100%
    - 所有验证步骤通过

# ================================================
# Verify 阶段配置
# ================================================
verify:
  dimensions:
    - completeness
    - correctness
    - coherence
  instruction: |
    验证实现与文档的一致性。

    检查维度：
    1. Completeness (完整性)
       - 所有任务完成
       - 所有需求实现
       - 所有场景覆盖

    2. Correctness (正确性)
       - 实现符合规格意图
       - 边界情况处理
       - 错误状态匹配

    3. Coherence (一致性)
       - 设计决策体现在代码中
       - 命名规范一致
       - 模式使用一致

# ================================================
# Archive 阶段配置
# ================================================
archive:
  syncSpecs: true
  moveToArchive: true
  instruction: |
    归档完成的变更。

    执行流程：
    1. 检查所有 artifact 状态
    2. 同步 delta specs 到 main specs
    3. 移动到 archive 目录
    4. 更新项目状态
