name: trinity-workflow
version: 1
description: |
  三位一体架构工作流 - 集成追踪层、方法层、执行层

  核心特性：
  - 追踪层：Planning-with-Files 自动追踪进度
  - 方法层：按阶段生成产出物
  - 执行层：3-Strike 错误处理协议

# ================================================
# Workflow Artifacts 定义
# ================================================
artifacts:
  # ----------------------------------------------
  # Phase 1: 需求探索
  # ----------------------------------------------
  - id: proposal
    generates: proposal.md
    description: 需求探索与方案设计
    template: proposal.md
    instruction: |
      ## Skill 调用
      触发词: superpowers/brainstorming 或 /superpowers:brainstorming
      [MUST] 执行前调用：Use the Skill tool with skill: "planning-with-files"

      创建需求提案文档，聚焦于 WHY 和 WHAT。

      [MUST] 创建前先初始化追踪文件：
      - task_plan.md: 阶段、目标、决策、错误日志
      - findings.md: 技术发现、架构决策
      - progress.md: 会话进度日志

      关键点：
      1. 明确问题陈述（Problem Statement）
      2. 提出多个方案选项（Options A/B/C）
      3. 定义成功指标（Success Metrics）
      4. 列出非目标（Non-goals）
      5. 评估影响范围（Impact Assessment）

      完成后更新 task_plan.md：
      - Phase: proposal
      - Status: complete
      - Progress: 20%
    requires: []

  # ----------------------------------------------
  # Phase 2: 技术设计
  # ----------------------------------------------
  - id: design
    generates: design.md
    description: 技术架构设计
    template: design.md
    instruction: |
      ## Skill 调用
      触发词: @writing-plans 或 /writing-plans
      [OPTIONAL] 架构图：Use the Skill tool with skill: "excalidraw-diagram"

      创建技术设计文档，聚焦于 HOW。

      关键点：
      1. 架构概述（Architecture Overview）
      2. 数据模型（Data Models）
      3. API 设计（API Design）
      4. 组件设计（Component Design）
      5. 风险与缓解（Risks & Mitigations）

      完成后更新 task_plan.md：
      - Phase: design
      - Status: complete
      - Progress: 40%

      在 findings.md 记录架构决策（ADR）。
    requires:
      - proposal

  # ----------------------------------------------
  # Phase 3: 规格说明
  # ----------------------------------------------
  - id: specs
    generates: specs/**/*.md
    description: 功能规格说明（Gherkin 格式）
    template: spec.md
    instruction: |
      创建功能规格说明文档。

      使用 Gherkin 格式（Given/When/Then）：
      - Feature: 功能名称
      - Scenario: 场景描述
      - Given: 前置条件
      - When: 触发动作
      - Then: 期望结果

      覆盖三种场景：
      - Happy Path: 成功路径
      - Edge Cases: 边界情况
      - Error Cases: 错误处理

      完成后更新 task_plan.md：
      - Phase: specs
      - Status: complete
      - Progress: 60%
    requires:
      - design

  # ----------------------------------------------
  # Phase 4: 任务分解
  # ----------------------------------------------
  - id: tasks
    generates: tasks.md
    description: 实现任务清单
    template: tasks.md
    instruction: |
      ## Skill 调用
      触发词: @executing-plans 或 /executing-plans

      创建任务分解清单。

      任务粒度要求：
      - 每个任务 2-5 分钟可完成
      - 每个任务有明确的验证步骤
      - 任务按批次（Batch）组织
      - 使用 `- [ ] X.Y Task description` 格式

      任务格式：
      ```markdown
      ## Batch 1: 基础设施
      - [ ] 1.1 创建数据模型
        - 验证：类型检查通过
      - [ ] 1.2 实现 Repository
        - 验证：单元测试通过
      ```

      完成后更新 task_plan.md：
      - Phase: tasks
      - Status: complete
      - Progress: 80%

      准备进入 apply 阶段。
    requires:
      - specs

# ================================================
# Apply 阶段配置
# ================================================
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    ## 执行流程

    1. 读取 tasks.md 获取任务列表
    2. 读取 task_plan.md 获取执行状态
    3. 按批次执行任务
    4. 完成任务后：
       - 更新 tasks.md 的 checkbox: `- [ ]` → `- [x]`
       - 更新 task_plan.md 的 Progress
       - 记录 progress.md 操作日志

    ## 错误处理（3-Strike 协议）

    | 尝试 | 动作 |
    |------|------|
    | Attempt 1 | 诊断并修复 |
    | Attempt 2 | 尝试替代方案 |
    | Attempt 3 | 重新思考问题 |
    | 3次失败 | 升级给用户 |

    在 task_plan.md 的错误日志中记录每次尝试：

    ```markdown
    | 错误 | 尝试 | 解决方案 |
    |------|------|----------|
    | TypeError: ... | 1 | 添加 null check |
    | TypeError: ... | 2 | 使用可选链 |
    | TypeError: ... | 3 | 重构数据流 |
    ```

    ## 完成标准

    - 所有 tasks.md 的 checkbox 已勾选
    - task_plan.md Progress: 100%
    - 所有验证步骤通过
