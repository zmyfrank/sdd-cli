name: trinity-workflow-v2
version: 2
description: |
  Trinity Workflow v2 - 深度集成 Planning-with-Files 与 OpenSpec 最佳实践

  核心特性：
  - 统一追踪层： Planning-with-Files 作为 Agent 上下文锚点
  - Delta Specs: ADDED/MODIFIED/removed 机制
  - Profile 模式: Quick/core/expanded 自动选择
  - 3-Strike 协议: 错误处理与升级机制

# ================================================
# 追踪层配置（声明式）
# ================================================
tracking:
  enabled: true
  description: |
    项目级追踪文件，作为 Agent 上下文锚点。
    Agent 可随时读取这些文件了解当前状态、修改历史、决策原因、下一步是什么？

  files:
    task_plan:
      path: "task_plan.md"
      description: "阶段、目标、决策、错误日志"
      template: ".agents/skills/trinity-workflow/templates/task_plan.md"

    findings:
      path: "findings.md"
      description: "技术发现、架构决策 (ADR)"
      template: ".agents/skills/trinity-workflow/templates/findings.md"

    progress:
      path: "progress.md"
      description: "会话进度日志、操作记录"
      template: ".agents/skills/trinity-workflow/templates/progress.md"

    delta_log:
      path: "delta-log.md"
      description: "Delta Specs 变更记录"
      template: ".agents/skills/trinity-workflow/templates/delta-log.md"

  events:
    onArtifactCreate:
      - update: task_plan.md
      - update: progress.md
    onArtifactComplete:
      - update: task_plan.md (progress)
      - update: progress.md (log)
    onDecisionMade:
      - update: findings.md (ADR)
    onError:
      - update: task_plan.md (error log)
      - update: progress.md (error log)

# ================================================
# Delta Specs 配置
# ================================================
deltaSpecs:
  enabled: true
  description: |
    Delta Specs 机制用于追踪规格变更：
    - ADDED: 新增的规格
    - MODIFIED: 修改的规格
    - REMOVED: 删除的规格

  syncToFindings: true
  syncToDeltaLog: true

  markers:
    added: "ADDED"
    modified: "MODIFIED"
    removed: "REMOVED"

  onArchive:
    - merge: delta → main specs
    - update: delta-log.md (archived)

# ================================================
# Profile 模式配置
# ================================================
profiles:
  quick:
    description: "快速模式 - 适用于单文件修改、Bug Fix"
    artifacts: [proposal, tasks]
    trackingLevel: "minimal"
    estimatedTime: "30min"

  core:
    description: "核心模式 - 适用于新功能、多文件变更"
    artifacts: [proposal, specs, design, tasks]
    trackingLevel: "standard"
    estimatedTime: "1-2h"

  expanded:
    description: "扩展模式 - 适用于复杂功能、跨模块、架构重构"
    artifacts: [proposal, specs, design, tasks, verify]
    trackingLevel: "detailed"
    estimatedTime: "2-4h"

  autoSelect:
    enabled: true
    rules:
      - condition: "single_file AND bug_fix"
        profile: quick
      - condition: "multi_file OR new_feature"
        profile: core
      - condition: "cross_module OR refactor OR complex"
        profile: expanded

# ================================================
# Workflow Artifacts 定义
# ================================================
artifacts:
  # ----------------------------------------------
  # Phase 1: 需求探索 (proposal)
  # ----------------------------------------------
  - id: proposal
    generates: proposal.md
    description: 需求探索与方案设计
    template: proposal.md
    tracking:
      oncreate:
        - update: task_plan.md (phase=proposal, progress=20%)
        - update: progress.md (log="proposal.md 创建")
      oncomplete:
        - update: task_plan.md (status=complete)
        - extract: findings.md (if decisions made)
    instruction: |
      ## Skill 调用
      触发词: /trinity:new 或 /trinity:ff

      创建需求提案文档，聚焦于 WHY 和 WHAT。

      [MUST] 创建前先初始化追踪文件：
      - task_plan.md: 阶段、目标、决策、错误日志
      - findings.md: 技术发现、架构决策
      - progress.md: 会话进度日志

      关键点：
      1. 明确问题陈述（Problem Statement）
      2. 提出多个方案选项（Options A/B/C）
      3. 定义成功指标（Success Metrics）
      4. 列出非目标（Non-goals）
      5. 评估影响范围（Impact Assessment）

      完成后更新 task_plan.md：
      - Phase: proposal
      - Status: complete
      - Progress: 20%
    requires: []

  # ----------------------------------------------
  # Phase 2: 功能规格 (specs)
  # ----------------------------------------------
  - id: specs
    generates: specs/**/*.md
    description: 功能规格说明（Delta Specs 机制）
    template: spec.md
    tracking:
      oncreate:
        - update: task_plan.md (phase=specs, progress=40%)
        - update: progress.md (log="specs/ 创建")
        - update: delta-log.md (record ADDED specs)
      oncomplete:
        - update: task_plan.md (status=complete)
        - sync: delta-log.md → findings.md
    instruction: |
      创建功能规格说明文档。

      使用 Gherkin 格式（given/when/then）：
      - Feature: 功能名称
      - Scenario: 场景描述
      - Given: 前置条件
      - When: 触发动作
      - Then: 期望结果

      覆盖三种场景：
      - Happy Path: 成功路径
      - Edge Cases: 边界情况
      - Error Cases: 错误处理

      Delta Specs 记录:
      - 所有新创建的 specs 标记为 ADDED
      - 更新 delta-log.md

      完成后更新追踪文件。
    requires:
      - proposal

  # ----------------------------------------------
  # Phase 3: 技术设计 (design)
  # ----------------------------------------------
  - id: design
    generates: design.md
    description: 技术架构设计
    template: design.md
    tracking:
      oncreate:
        - update: task_plan.md (phase=design, progress=60%)
        - update: progress.md (log="design.md 创建")
      oncomplete:
        - update: task_plan.md (status=complete)
        - extract: findings.md (ADR from design)
    instruction: |
      创建技术设计文档，聚焦于 HOW。

      关键点：
      1. 架构概述（Architecture Overview）
      2. 数据模型（Data Models）
      3. API 设计（API Design）
      4. 组件设计（Component Design）
      5. 风险与缓解（Risks & Mitigations）
      6. Breaking changes

      架构决策记录：
      - 提取关键决策到 findings.md 作为 ADR
      - 记录决策理由和替代方案

      完成后更新追踪文件。
    requires:
      - specs

  # ----------------------------------------------
  # Phase 4: 任务分解 (tasks)
  # ----------------------------------------------
  - id: tasks
    generates: tasks.md
    description: 实现任务清单
    template: tasks.md
    tracking:
      oncreate:
        - update: task_plan.md (phase=tasks, progress=80%)
        - update: progress.md (log="tasks.md 创建")
        - sync: tasks.md → task_plan.md (task list)
      oncomplete:
        - update: task_plan.md (status=complete)
    instruction: |
      创建任务分解清单。

      任务粒度要求：
      - 每个任务 2-5 分钟可完成
      - 每个任务有明确的验证步骤
      - 任务按批次（Batch）组织
      - 使用 `- [ ] X.Y Task description` 格式

      任务格式：
      ```markdown
      ## Batch 1: 基础设施
      - [ ] 1.1 创建数据模型
        - 验证：类型检查通过
      - [ ] 1.2 实现 Repository
        - 验证：单元测试通过
      ```

      完成后更新追踪文件。
    requires:
      - design

# ================================================
# Apply 阶段配置
# ================================================
apply:
  requires:
    - tasks
  tracks: tasks.md
  tracking:
    onTaskStart:
      - update: progress.md (log="任务 {id} 开始")
    onTaskComplete:
      - update: tasks.md (checkbox [x])
      - update: task_plan.md (progress)
      - update: progress.md (log="任务 {id} 完成")
    onTaskError:
      - update: task_plan.md (error log)
      - update: progress.md (error log)
      - trigger: 3-strike protocol
  instruction: |
    ## 执行流程

    1. 读取 tasks.md 获取任务列表
    2. 读取 task_plan.md 获取执行状态
    3. 读取 findings.md 获取设计决策
    4. 按批次执行任务
    5. 完成任务后更新追踪文件

    ## 错误处理（3-Strike 协议）

    | 尝试 | 动作 | 记录 |
    |------|------|------|
    | Attempt 1 | 诊断并修复 | progress.md |
    | Attempt 2 | 尝试替代方案 | findings.md |
    | Attempt 3 | 重新思考问题 | findings.md |
    | 3次失败 | 升级给用户 | task_plan.md [BLOCK] 籊 |

    ## 完成标准

    - 所有 tasks.md 的 checkbox 已勾选
    - task_plan.md Progress: 100%
    - 所有验证步骤通过

# ================================================
# verify 阶段配置
# ================================================
verify:
  dimensions:
    - id: completeness
      description: "所有任务完成？所有规格实现？"
      check:
        - tasks.md 所有 checkbox [x]
        - specs/ 所有规格有对应代码

    - id: correctness
      description: "实现是否符合规格？测试是否通过？"
      check:
        - npm test 通过
        - 类型检查通过
        - 对照 specs 验证
    - id: coherence
      description: "设计决策体现在代码中？ADR 是否遵循？"
      check:
        - findings.md ADR 在代码中体现
        - design.md 架构已实现

  tracking:
    preVerify:
      - check: tracking files exist
      - check: tracking files complete
    onPass:
      - update: task_plan.md (status=VERIFIED)
      - update: progress.md (log="验证通过")
      - update: findings.md (验证发现)
    onFail:
      - update: task_plan.md (status=FAILED)
      - update: progress.md (失败日志)
      - trigger: 3-strike protocol

  trackingValidation:
    enabled: true
    requiredFiles:
      - task_plan.md
      - findings.md
      - progress.md
    optionalFiles:
      - delta-log.md (if specs created)
  instruction: |
    ## 验证流程

    ### Phase 1: 追踪完整性检查
    - [ ] task_plan.md 存在且完整
    - [ ] findings.md 存在
    - [ ] progress.md 存在且完整
    - [ ] delta-log.md 存在（如有 specs)

    ### Phase 2: 三维度验证
    1. **Completeness**: 所有任务完成
    2. **Correctness**: 实现符合规格
    3. **coherence**: 设计决策已体现

    ### Phase 3: 结果归档
    - 通过： 更新 task_plan.md 状态为 VERIFIED
    - 失败: 触发 3-Strike 协议

# ================================================
# archive 阶段配置
# ================================================
archive:
  requires:
    - verify
  tracking:
    preArchive:
      - check: verify passed
      - check: tracking files complete
    onArchive:
      - merge: delta specs → main specs
      - move: changes/{id} → changes/archive/{id}/
      - generate: archive summary
      - update: progress.md (归档日志)
      - clear: .active file
  instruction: |
    ## 归档流程

    ### Phase 1: 最终验证
    - 确认 verify 已通过
    - 磀认追踪文件完整

    ### Phase 2: 执行归档
    1. **合并 Delta Specs 到 Main Specs**
       - ADDED: 复制到 main-specs/
       - MODIFIED: 合并到 main-specs/
       - REMOVED: 从 main-specs/ 删除
    2. **移动变更目录到归档位置**
       - openspec/changes/{id}/
       → openspec/changes/archive/{id}/
    3. **清理活跃状态**
       - 清空 openspec/.active 文件
       - 或指向下一个活跃变更

    3. **生成总结报告**
       合并追踪文件生成变更总结:
       - 从 task_plan.md 提取阶段进度
       - 从 findings.md 提取架构决策
       - 从 progress.md 提取关键日志
       - 从 delta-log.md 提取规格变更

# ================================================
# 3-Strike 协议配置
# ================================================
threeStrike:
  enabled: true
  attempts:
    - attempt: 1
      action: "诊断并修复"
      logTo: progress.md
    - attempt: 2
      action: "尝试替代方案"
      logTo: findings.md
    - attempt: 3
      action: "重新思考问题"
      logTo: findings.md
  onAllFailed:
    action: "升级给用户"
    logTo:
      - task_plan.md (status=BLOCK)
      - progress.md (升级日志)
    suggestions:
      - "检查相关配置"
      - "查阅文档"
      - "寻求团队帮助"

# ================================================
# Trinity Skills 映射
# ================================================
skills:
  trinity-new:
    file: ".agents/skills/trinity-new.md"
    triggers: ["/trinity:new", "/trinity:ff"]
    description: "创建新变更（带追踪）"

  trinity-continue:
    file: ".agents/skills/trinity-continue.md"
    triggers: ["/trinity:continue"]
    description: "继续变更（带追踪）"

  trinity-apply:
    file: ".agents/skills/trinity-apply.md"
    triggers: ["/trinity:apply"]
    description: "执行任务（带追踪)"

  trinity-verify:
    file: ".agents/skills/trinity-verify.md"
    triggers: ["/trinity:verify"]
    description: "验证变更（带追踪)"

  trinity-archive:
    file: ".agents/skills/trinity-archive.md"
    triggers: ["/trinity:archive"]
    description: "归档变更（带追踪)"

  trinity-ff:
    file: ".agents/skills/trinity-ff.md"
    triggers: ["/trinity:ff"]
    description: "快速流程（带追踪)"
