# ================================================
# OpenSpec 项目配置
# Schema: trinity-workflow-v2（三位一体架构工作流 v2）
# ================================================
schema: trinity-workflow-v2

# ================================================
# 项目上下文（注入所有产出物）
# ================================================
context: |
  语言：中文（简体）
  所有产出物必须用简体中文撰写。

  # 项目技术栈（根据项目实际情况修改）
  Tech stack: TypeScript, React, Node.js

  # ═══════════════════════════════════════════════
  # Trinity Workflow v2（三位一体架构 v2）
  # ═══════════════════════════════════════════════

  本项目使用 trinity-workflow-v2 schema，它深度集成了 OpenSpec 最佳实践：

  ## 1. 统一追踪层（Planning-with-Files 作为上下文锚点）
  - task_plan.md: 阶段、目标、决策、错误日志
  - findings.md: 技术发现、架构决策 (ADR)
  - progress.md: 会话进度日志、操作记录
  - delta-log.md: Delta Specs 变更记录 (ADDED/MODIFIED/REMOVED)

  Agent 可随时读取这些文件了解：
  - 当前在哪个阶段？
  - 哪些文件已修改？
  - 为什么修改？
  - 下一步是什么？

  ## 2. Schema 驱动的 Artifact 依赖图
  proposal.md ──→ specs/ (Delta) ──→ design.md ──→ tasks.md

  ## 3. Profile 模式（自动选择）
  - Quick: proposal → tasks → apply (单文件修改、Bug Fix)
  - Core: proposal → specs → design → tasks → apply (新功能、多文件)
  - Expanded: 全流程 + verify (复杂功能、跨模块)

  ## 4. 执行层（3-Strike 协议 + Verify 集成）
  - Attempt 1: 诊断并修复
  - Attempt 2: 尝试替代方案
  - Attempt 3: 重新思考问题
  - 3次失败后: 升级给用户

  ## 5. Trinity Skills（内联 OpenSpec 逻辑 + 追踪）
  - /trinity:new - 创建新变更
  - /trinity:continue - 继续下一个 artifact
  - /trinity:apply - 执行任务
  - /trinity:verify - 验证实现
  - /trinity:archive - 归档变更
  - /trinity:ff - 快速流程

  [MUST] 使用 Trinity Skills 自动管理追踪文件。

  ## 6. 平台兼容性
  - Claude Code: Skills 在 .claude/skills/
  - OpenCode: Skills 在 .opencode/skills/

# ================================================
# 产出物规则（按 artifact 类型）
# ================================================
rules:
  proposal:
    - 字数控制在 500 字以内
    - 必须包含 Non-goals 章节
    - 必须提供 2-3 个方案选项
    - 必须定义成功指标
  design:
    - 必须包含架构图
    - 必须列出风险与缓解措施
    - 必须说明 Breaking Changes
  specs:
    - 使用 Given/When/Then 格式
    - 覆盖 Happy Path、Edge Cases、Error Cases
  tasks:
    - 每个任务 2-5 分钟可完成
    - 每个任务有明确的验证步骤
    - 任务按批次（Batch）组织

# ================================================
# Trinity Skills 配置
# ================================================
trinity:
  enabled: true

  skills:
    new:
      trigger: "/trinity:new"
      file: "trinity-new/SKILL.md"
      description: "创建新变更（带追踪）"

    continue:
      trigger: "/trinity:continue"
      file: "trinity-continue/SKILL.md"
      description: "继续变更（带追踪）"

    apply:
      trigger: "/trinity:apply"
      file: "trinity-apply/SKILL.md"
      description: "执行任务（带追踪）"

    verify:
      trigger: "/trinity:verify"
      file: "trinity-verify/SKILL.md"
      description: "验证变更（带追踪）"

    archive:
      trigger: "/trinity:archive"
      file: "trinity-archive/SKILL.md"
      description: "归档变更（带追踪）"

    ff:
      trigger: "/trinity:ff"
      file: "trinity-ff/SKILL.md"
      description: "快速流程（带追踪）"

# ================================================
# 追踪文件配置
# ================================================
tracking:
  templates_dir: "trinity-workflow/templates"
  auto_update: true
  files:
    - task_plan.md
    - findings.md
    - progress.md
    - delta-log.md

# ================================================
# Profile 模式配置
# ================================================
profiles:
  quick:
    description: "快速模式 - 适用于单文件修改、Bug Fix"
    artifacts: [proposal, tasks]
    estimated_time: "30min"

  core:
    description: "核心模式 - 适用于新功能、多文件变更"
    artifacts: [proposal, specs, design, tasks]
    estimated_time: "1-2h"

  expanded:
    description: "扩展模式 - 适用于复杂功能、跨模块、架构重构"
    artifacts: [proposal, specs, design, tasks, verify]
    estimated_time: "2-4h"

  autoSelect:
    enabled: true
    rules:
      - condition: "single_file AND bug_fix"
        profile: quick
      - condition: "multi_file OR new_feature"
        profile: core
      - condition: "cross_module OR refactor OR complex"
        profile: expanded
