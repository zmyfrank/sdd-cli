# Worktrunk + Trinity 集成配置

# ==============
# OpenSpec 同步
# ==============

[pre-switch]
sync-specs = "git fetch origin main && git checkout origin/main -- openspec/specs/ openspec/project.md openspec/config.yaml && echo '✓ OpenSpec synced from origin/main'"

# ==============
# 通知
# ==============

[post-merge]
notify = "osascript -e 'display notification \"✅ {{ branch }} merged\" with title \"Worktrunk\"' 2>/dev/null || true"

# ==============
# 测试
# ==============

[pre-merge]
test = "npm test 2>/dev/null || echo 'No tests'"
check-archive = """
if [ -d "openspec/changes" ] && find openspec/changes -name '*.md' -type f | grep -v '/archived/' | grep -q .; then
  echo '❌ ERROR: Unarchived active changes found in openspec/changes/' >&2
  echo '   Please archive or complete these changes before merging.' >&2
  exit 1
else
  echo '✓ No unarchived changes detected'
fi
"""

# ==============
# Agent 启动提示
# ==============

[post-switch]
hint = """
echo ''
echo '🚀 Worktree ready: {{ branch }}'
echo ''
echo '📋 Start Agent:'
echo '   claude    # Claude Code'
echo '   opencode  # OpenCode'
echo ''
echo '📖 Context: .trinity-context.md'
echo ''
echo '────────────────────────────────────────'
echo ''
echo 'Quick Start:'
echo '   wt switch --create feat-xxx   # Create new feature'
echo '   /trinity:new <name>           # Create change (inside Agent)'
echo '   /trinity:apply                # Execute tasks'
echo ''
}
"""

# ==============
# 清理
# ==============

[post-remove]
cleanup = "lsof -ti :{{ branch | hash_port }} -sTCP:LISTEN | xargs kill 2>/dev/null || true"